apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "levoai-shadownet.name" . }}
  labels:
    app: {{ include "levoai-shadownet.name" . }}
    release: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "levoai-shadownet.name" . }}
  template:
    metadata:
      annotations:
        checksum/config: "{{ include "calculateConfigChecksum" . }}"
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ include "levoai-shadownet.name" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $secretMounts := list }}
      {{- if .Values.secretMounts }}
      {{- $secretMounts = concat $secretMounts .Values.secretMounts }}
      {{- end }}
      {{- if hasKey .Values "global" }}
      {{- if hasKey .Values.global "levo" }}
      {{- if hasKey .Values.global.levo "secretMounts" }}
      {{- $secretMounts = concat $secretMounts .Values.global.levo.secretMounts }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- $configMapMounts := list }}
      {{- if .Values.configMapMounts }}
      {{- $configMapMounts = concat $configMapMounts .Values.configMapMounts }}
      {{- end }}
      {{- if hasKey .Values "global" }}
      {{- if hasKey .Values.global "levo" }}
      {{- if hasKey .Values.global.levo "configMapMounts" }}
      {{- $configMapMounts = concat $configMapMounts .Values.global.levo.configMapMounts }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if or $secretMounts $configMapMounts }}
      volumes:
      {{- range $secretMounts }}
      - name: {{ .name }}
        secret:
          secretName: {{ .secretName }}
          {{- if .items }}
          items:
          {{- range .items }}
          - key: {{ .key }}
            path: {{ .path }}
          {{- end }}
          {{- end }}
          {{- if .defaultMode }}
          defaultMode: {{ .defaultMode }}
          {{- end }}
      {{- end }}
      {{- range $configMapMounts }}
      - name: {{ .name }}
        configMap:
          name: {{ .configMapName }}
          {{- if .items }}
          items:
          {{- range .items }}
          - key: {{ .key }}
            path: {{ .path }}
          {{- end }}
          {{- end }}
          {{- if .defaultMode }}
          defaultMode: {{ .defaultMode }}
          {{- end }}
      {{- end }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "levoai-shadownet.name" . }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: {{ .Values.image.registry }}/{{ .Values.image.repo }}/{{ .Values.image.name }}:{{ default .Chart.Version .Values.image.tagOverride }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          tty: true
          args:
          - "worker"
          - "--key"
          - "{{ .Values.key }}"
          - "--organization"
          - "{{ .Values.orgId }}"
          {{- if .Values.scheduled }}
          - "--scheduled"
          {{- end }}
          {{- if .Values.group }}
          - "--group"
          - "{{ .Values.group }}"
          {{- end }}
          {{- $envVars := dict }}
          {{- if hasKey .Values "global" }}
          {{- if hasKey .Values.global "levo" }}
          {{- if hasKey .Values.global.levo "env" }}
          {{- $envVars = merge $envVars .Values.global.levo.env }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- $envVars = merge $envVars .Values.extraEnv }}
          {{- end }}
          env:
          - name: LEVOAI_BASE_URL
            value: "{{ .Values.levoBaseUrl }}"
          - name: ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                name: levoai-shadownet-secret
                key: anthropic-api-key
                optional: true
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: levoai-shadownet-secret
                key: openai-api-key
                optional: true
          {{- if $envVars }}
          {{- range $key, $value := $envVars }}
          - name: {{ $key }}
            value: {{ $value | quote }}
          {{- end }}
          {{- end }}
          {{- if .Values.extraEnvVars }}
          {{- toYaml .Values.extraEnvVars | nindent 10 }}
          {{- end }}
          {{- if or .Values.extraEnvVarsCM .Values.extraEnvVarsSecret }}
          envFrom:
            {{- if .Values.extraEnvVarsCM }}
              - configMapRef:
                  name: {{ tpl .Values.extraEnvVarsCM . | quote }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ tpl .Values.extraEnvVarsSecret . | quote }}
            {{- end }}
          {{- end }}
          {{- if or $secretMounts $configMapMounts }}
          volumeMounts:
          {{- range $secretMounts }}
          - name: {{ .name }}
            mountPath: {{ .mountPath }}
            {{- if .subPath }}
            subPath: {{ .subPath }}
            {{- end }}
            readOnly: true
          {{- end }}
          {{- range $configMapMounts }}
          - name: {{ .name }}
            mountPath: {{ .mountPath }}
            {{- if .subPath }}
            subPath: {{ .subPath }}
            {{- end }}
            readOnly: true
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
