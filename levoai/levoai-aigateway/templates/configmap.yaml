{{- $configMapEnabled := eq (include "aigateway.config.configMap.enabled" .) "true" }}
{{- $configMapCreate := eq (include "aigateway.config.configMap.create" .) "true" }}
{{- if and $configMapEnabled $configMapCreate }}
{{- $gi := .Values.config.guardrailIngest }}
{{- $hasGI := and $gi $gi.endpoint }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aigateway.config.configMap.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aigateway.labels" . | nindent 4 }}
data:
  config.yaml: |
{{- if $hasGI }}
    {{- /* Merge ingest fields into user-supplied configMap.data by parsing its
           YAML, adding guardrailIngest to any existing top-level `config:` map
           (or creating one), then re-emitting. Prevents duplicate top-level
           `config:` keys when operator data already has one. */ -}}
    {{- $parsed := fromYaml (.Values.config.configMap.data | default "") }}
    {{- if not $parsed }}{{- $parsed = dict }}{{- end }}
    {{- $cfg := index $parsed "config" | default dict }}
    {{- $_ := set $cfg "guardrailIngest" (dict
          "endpoint" $gi.endpoint
          "batchSize" (int ($gi.batchSize | default 10))
          "flushInterval" ($gi.flushInterval | default "5s")) }}
    {{- $_ := set $parsed "config" $cfg }}
{{ $parsed | toYaml | indent 4 }}
{{- else }}
{{ .Values.config.configMap.data | indent 4 }}
{{- end }}
{{- end }}
