# AIGatewayParameters for Guardrails Support
#
# This configures the data plane pods with ML models for guardrails (llmBastion).
# Apply this before creating your GatewayClass that references it.
#
# Two deployment options:
#   1. Development: emptyDir + ALLOW_MODEL_DOWNLOAD=true (models download on first request)
#   2. Production: PVC with pre-loaded models (faster startup, recommended)
#
# Usage:
#   kubectl apply -f aigateway-params-guardrails.yaml
#
---
# Option 1: Development - Auto-download models (slower first request)
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: guardrails-dev
  namespace: aigateway-system
spec:
  env:
    - name: ALLOW_MODEL_DOWNLOAD
      value: "true"
    - name: MODELS_BASE_PATH
      value: /opt/models

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  deployment:
    spec:
      template:
        spec:
          containers:
            - name: agentgateway
              volumeMounts:
                - name: models
                  mountPath: /opt/models
          volumes:
            - name: models
              emptyDir:
                sizeLimit: 10Gi

---
# Option 2: Production - Use pre-loaded models from PVC (faster startup)
# Requires: PVC named 'aigateway-models' with models already loaded
# See helm/aigateway/templates/models-pvc.yaml for PVC creation
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: guardrails-prod
  namespace: aigateway-system
spec:
  env:
    - name: MODELS_BASE_PATH
      value: /opt/models

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  deployment:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: ghcr-registry-secret
          containers:
            - name: agentgateway
              volumeMounts:
                - name: models
                  mountPath: /opt/models
                  readOnly: true
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: aigateway-models

---
# GatewayClass for development (auto-download models)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aigateway-guardrails-dev
spec:
  controllerName: agentgateway.dev/agentgateway
  parametersRef:
    group: agentgateway.dev
    kind: AgentgatewayParameters
    name: guardrails-dev
    namespace: aigateway-system

---
# GatewayClass for production (pre-loaded models)
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aigateway-guardrails
spec:
  controllerName: agentgateway.dev/agentgateway
  parametersRef:
    group: agentgateway.dev
    kind: AgentgatewayParameters
    name: guardrails-prod
    namespace: aigateway-system

---
# Example Gateway using the guardrails GatewayClass
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway
  namespace: ai-demos
spec:
  gatewayClassName: aigateway-guardrails
  listeners:
    - name: http
      port: 8080
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

---
# Example AIGatewayPolicy with llmBastion guardrails
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: guardrails-policy
  namespace: ai-demos
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: my-llm-backend
  backend:
    ai:
      promptGuard:
        request:
          - llmBastion:
              failFast: true
              scanners:
                - scannerType: PromptInjection
                  enabled: true
                - scannerType: Toxicity
                  enabled: true
            rejection:
              statusCode: 400
              message: "Request blocked by guardrails"
