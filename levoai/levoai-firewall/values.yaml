# Default values for levoai-firewall
# This is a YAML-formatted file.

# Override the name used for Kubernetes resources (Deployment, Service, ConfigMap).
# Defaults to the chart name. Set this to preserve resource names when upgrading from an older chart version.
nameOverride: ""

# Global configuration (for multi-chart deployments)
global:
  levo:
    secretMounts: []
    configMapMounts: []
    env: {}

# Number of replicas
replicaCount: 1

# Image configuration
image:
  registry: docker.io
  repo: levoai
  name: ai-firewall
  pullPolicy: IfNotPresent
  tagOverride: ""

# Image pull secrets
imagePullSecrets: []

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
containerSecurityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 512Mi
  # requests:
  #   cpu: 500m
  #   memory: 256Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Pod annotations
podAnnotations: {}
  # sidecar.istio.io/inject: "false"

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

# Use ConfigMap for main configuration
useConfigMap: true

# Vigil configuration (matches vigil.yaml structure)
# If not provided, the default config from the container image will be used
config:
  vigil:
    # Main vigil.yaml content
    server:
      listen_addr: "0.0.0.0:8080"
      workers: 4
      timeout_secs: 30
    upstream:
      address: "api.openai.com:443"
      tls: true
      sni: "api.openai.com"
      pool_size: 32
    detection:
      stages:
        fast_filters: true
        classifier: false
        semantic: false
        policy: true
      thresholds:
        block: 0.85
        flag: 0.5
      patterns_dir: "./data/patterns"
      models_dir: "./data/models"
      max_prompt_length: 100000
    observability:
      log_level: "info"
      json_logs: false
      metrics_path: "/metrics"
      log_prompts: false

# Multi-tenant configuration (optional)
# Can also be specified in config.vigil.tenants
tenants: {}
# Example:
# tenants:
#   acme-corp:
#     thresholds:
#       block: 0.9
#       flag: 0.6
#     api_key_header: "X-API-Key"

# Extra environment variables
extraEnv: {}

# Extra environment variables (as list)
extraEnvVars: []

# Extra environment variables from ConfigMap
extraEnvVarsCM: ""

# Extra environment variables from Secret
extraEnvVarsSecret: ""

# Secret mounts
secretMounts: []
# Example:
# secretMounts:
#   - name: tls-cert
#     secretName: vigil-tls
#     mountPath: /etc/vigil/tls
#     items:
#       - key: tls.crt
#         path: cert.pem
#       - key: tls.key
#         path: key.pem

# ConfigMap mounts
configMapMounts: []
# Example:
# configMapMounts:
#   - name: custom-config
#     configMapName: vigil-custom-config
#     mountPath: /app/config/custom
#     items:
#       - key: custom.yaml
#         path: custom.yaml

# Health check configuration
healthcheck:
  enabled: true
  path: "/health"
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

# Liveness probe
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

# Readiness probe
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3
