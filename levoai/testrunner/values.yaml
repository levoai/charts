global:
  levo:
    secretMounts: []
    configMapMounts: []
    env: {}

replicaCount: 3

image:
  repository: levoai/levo
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []

levoBaseUrl: "https://api.levo.ai"
key: ""
orgId: ""
scheduled: False
group: ""

# identity: optional prefix for the testrunner's Temporal worker/client
# identity (passed to temporalio.client.Client.connect(identity=...)).
# Each replica MUST have a distinct identity, so the pod name (injected via the
# Downward API) is appended automatically: "<identity>-<pod-name>".
# When left empty, the CLI derives a per-replica identity from the pod
# hostname, process id, version and group.
identity: ""
localUserId: "1000" # Replace with your actual user ID
localGroupId: "1000" # Replace with your actual group ID
configstorePath: "/home/levo/.config/configstore"


resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# hostAliases: equivalent of `curl --resolve` at the Pod level. Each entry adds a line
# to /etc/hosts for all containers in the Pod, so any target whose DNS is not resolvable
# in-cluster (e.g., split-horizon DNS, private endpoints) can still be reached by
# hostname. The hostname is required on the request — connecting by IP instead of the
# DNS name can cause SNI/hostname mismatch, and TLS validation will typically fail if
# the certificate SAN/CN is issued for the hostname rather than the IP. Default: none.
#
# Example:
# hostAliases:
#   - ip: "10.0.0.5"
#     hostnames:
#       - "api.internal.example.com"
hostAliases: []

podLabels: {}

podAnnotations: {}

extraEnv: {}

extraEnvVars: []

extraEnvVarsCM: []

extraEnvVarsSecret: []

