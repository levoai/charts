{{- $saasEnabled := eq (include "aigateway.config.saas.enabled" .) "true" }}
{{- $refreshToken := include "aigateway.config.saas.refreshToken" . }}
{{- if and $saasEnabled $refreshToken }}
# =============================================================================
# SaaS Refresh Token Secret
# =============================================================================
# WARNING: Do not pass config.saas.refreshToken via `--set` as it will be
# stored in the Helm release secret (visible in plain text via `helm get values`).
# Instead, use one of these secure approaches:
#   1. External secret management (e.g., External Secrets Operator, Vault)
#   2. Helm's `--set-file` option: --set-file config.saas.refreshToken=token.txt
#   3. Create the secret manually and reference it
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aigateway.fullname" . }}-saas
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aigateway.labels" . | nindent 4 }}
type: Opaque
data:
  refresh-token: {{ $refreshToken | b64enc | quote }}
{{- end }}
