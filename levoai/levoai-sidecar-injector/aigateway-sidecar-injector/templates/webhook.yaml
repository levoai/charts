apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "sidecar-injector.fullname" . }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
webhooks:
  - name: sidecar-injector.levo.ai
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    reinvocationPolicy: {{ .Values.webhook.reinvocationPolicy }}
    clientConfig:
      service:
        name: {{ include "sidecar-injector.webhookServiceName" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: 443
      # caBundle must match the CA that signed the webhook's serving certificate.
      # Options: (a) set webhook.caBundle in values.yaml, (b) use cert-manager with
      # cert-manager.io/inject-ca-from annotation, (c) populate manually post-install.
      caBundle: {{ .Values.webhook.caBundle | default "" | quote }}
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: Namespaced
    {{- with .Values.webhook.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    matchPolicy: Equivalent
    timeoutSeconds: 10
