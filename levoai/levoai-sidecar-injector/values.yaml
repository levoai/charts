# =============================================================================
# Levo AI Gateway Sidecar Injector — Helm Values
# =============================================================================

# -- Number of injector replicas (HA recommended: 2+).
replicaCount: 2

# -- Injector webhook server image.
image:
  registry: "docker.io"
  repository: "levoai/ai-gateway-sidecar-injector"
  tag: ""  # defaults to chart appVersion
  pullPolicy: IfNotPresent

# -- Image pull secrets.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  annotations: {}
  name: ""

# =============================================================================
# Webhook Configuration
# =============================================================================
webhook:
  # -- Failure policy: Ignore means pods still start if injector is down.
  failurePolicy: Ignore
  # -- Reinvocation policy for interaction with other mutating webhooks.
  reinvocationPolicy: IfNeeded
  # -- Namespace selector: only inject in namespaces with this label.
  namespaceSelector:
    matchLabels:
      levo.ai/inject: enabled
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system
          - kube-public
          - kube-node-lease
  # -- Additional namespaces to exclude (appended to the default exclusion list).
  excludedNamespaces: []
  # -- Webhook server port.
  port: 8443
  # -- If set, use this existing Secret for webhook TLS instead of creating one.
  existingTlsSecret: ""
  # -- Base64-encoded CA bundle for the webhook. If empty, you must use cert-manager
  # or manually populate the MutatingWebhookConfiguration's caBundle field.
  caBundle: ""

# =============================================================================
# Sidecar Configuration (defaults for injected sidecars)
# =============================================================================
sidecar:
  image:
    registry: "docker.io"
    repository: "levoai/ai-gateway"
    tag: ""  # defaults to chart appVersion
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  ports:
    # -- Port for transparent interception.
    transparent: 15001
    # -- Port for explicit proxy mode.
    proxy: 15002
    # -- Port for admin/health endpoints.
    admin: 15000
  # -- UID for the sidecar process (avoid 1337 = Istio).
  uid: 1610

# =============================================================================
# TLS / CA Certificate Configuration
# =============================================================================
tls:
  # -- Name of the K8s Secret containing the CA cert + key for TLS MITM.
  caSecretName: levo-ca-cert
  # -- Auto-generate a self-signed CA cert on install.
  generateCA: true
  # -- CA certificate validity period in days.
  caValidityDays: 365

# =============================================================================
# Levo Control Plane
# =============================================================================
controlPlane:
  # -- Levo platform endpoint.
  endpoint: "https://api.levo.ai"
  # -- Name of the K8s Secret containing auth credentials (tenant-id, auth-token).
  authSecretName: levo-auth

# =============================================================================
# Service Mesh Coexistence
# =============================================================================
meshCoexistence:
  # -- Auto-detect Istio/Linkerd presence.
  autoDetect: true
  istio:
    # -- Add annotation to exclude Levo traffic from Istio capture.
    excludeFromIstioCapture: true
  linkerd:
    # -- Add annotation to exclude Levo traffic from Linkerd capture.
    excludeFromLinkerdCapture: true

# =============================================================================
# Interception Defaults
# =============================================================================
# -- Default interception mode for injected sidecars.
defaultInterceptMode: transparent
# -- Default ports to intercept.
defaultInterceptPorts: "443"
# -- Default ports to exclude from interception.
defaultExcludePorts: ""
# -- Default CIDRs to exclude from interception.
defaultExcludeCIDRs: ""

# =============================================================================
# Injector Resources
# =============================================================================
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Pod-level security context for the injector.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# -- Container-level security context for the injector.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity.
affinity: {}
