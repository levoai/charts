apiVersion: v1
kind: Service
metadata:
  name: {{ include "sidecar-injector.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: webhook
      protocol: TCP
      name: webhook
  selector:
    {{- include "sidecar-injector.selectorLabels" . | nindent 4 }}
