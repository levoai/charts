{{- if not .Values.webhook.existingTlsSecret }}
# Webhook TLS Secret — stores the TLS certificate and key used by the webhook server.
#
# This Secret is created as a placeholder. Populate it using one of:
#   1. cert-manager: Annotate with cert-manager.io/issuer or cert-manager.io/cluster-issuer
#   2. Manual: Generate a cert for the webhook service DNS name and create the Secret.
#      IMPORTANT: Kubernetes requires SANs — a cert with only a CN field is rejected
#      since Go 1.15. The cert MUST include all four DNS forms of the service name.
#        SERVICE_NAME={{ include "sidecar-injector.webhookServiceName" . }}
#        NAMESPACE={{ .Release.Namespace }}
#        openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 -days 365 -nodes \
#          -keyout tls.key -out tls.crt \
#          -subj "/CN=${SERVICE_NAME}.${NAMESPACE}.svc" \
#          -addext "subjectAltName=DNS:${SERVICE_NAME},DNS:${SERVICE_NAME}.${NAMESPACE},DNS:${SERVICE_NAME}.${NAMESPACE}.svc,DNS:${SERVICE_NAME}.${NAMESPACE}.svc.cluster.local"
#        kubectl create secret tls {{ include "sidecar-injector.fullname" . }}-webhook-tls \
#          --cert=tls.crt --key=tls.key -n ${NAMESPACE}
#   3. A Helm hook Job that generates the cert on install (not included in this chart).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sidecar-injector.fullname" . }}-webhook-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  # Placeholder — the injector will start in non-TLS dev mode if these are empty.
  # In production, populate this Secret before deploying.
  tls.crt: ""
  tls.key: ""
{{- end }}
