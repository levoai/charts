{{- if .Values.tls.generateCA }}
# ===========================================================================
# CA Certificate Secret (Placeholder)
# ===========================================================================
# This Secret is created with EMPTY tls.crt and tls.key fields. The injector
# will fail to start TLS MITM until these are populated. Two approaches:
#
# APPROACH 1 — Manual CA generation (recommended for initial setup):
#   openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:P-256 \
#     -days {{ .Values.tls.caValidityDays }} -nodes \
#     -keyout ca.key -out ca.crt \
#     -subj "/CN=Levo AI Gateway CA/O=Levo AI"
#   kubectl create secret tls {{ .Values.tls.caSecretName }} \
#     --cert=ca.crt --key=ca.key -n {{ .Release.Namespace }} \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# APPROACH 2 — cert-manager (recommended for production):
#   Create a self-signed ClusterIssuer and Certificate resource that
#   targets this Secret name. cert-manager will auto-populate and rotate it.
#
# To skip this placeholder and provide your own Secret, set tls.generateCA=false.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.caSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/resource-policy": keep
type: kubernetes.io/tls
data:
  # Placeholder — replace with actual CA cert/key or use a post-install Job.
  # The injector will fail to start if these are empty.
  tls.crt: ""
  tls.key: ""
{{- end }}
