apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "testrunner.name" . }}
  labels:
    release: {{ .Release.Name }}
    app: {{ include "testrunner.name" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "testrunner.name" . }}
  template:
    metadata:
      labels:
        release: {{ .Release.Name }}
        app: {{ include "testrunner.name" . }}
      {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      annotations:
        checksum/config: "{{ include "calculateConfigChecksum" . }}"
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $secretMounts := list }}
      {{- if .Values.secretMounts }}
      {{- $secretMounts = concat $secretMounts .Values.secretMounts }}
      {{- end }}
      {{- if hasKey .Values "global" }}
      {{- if hasKey .Values.global "levo" }}
      {{- if hasKey .Values.global.levo "secretMounts" }}
      {{- $secretMounts = concat $secretMounts .Values.global.levo.secretMounts }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- $configMapMounts := list }}
      {{- if .Values.configMapMounts }}
      {{- $configMapMounts = concat $configMapMounts .Values.configMapMounts }}
      {{- end }}
      {{- if hasKey .Values "global" }}
      {{- if hasKey .Values.global "levo" }}
      {{- if hasKey .Values.global.levo "configMapMounts" }}
      {{- $configMapMounts = concat $configMapMounts .Values.global.levo.configMapMounts }}
      {{- end }}
      {{- end }}
      {{- end }}
      {{- if or $secretMounts $configMapMounts }}
      volumes:
        {{- range $secretMounts }}
        - name: {{ .name }}
          secret:
            secretName: {{ .secretName }}
            {{- if .items }}
            items:
              {{- range .items }}
              - key: {{ .key }}
                path: {{ .path }}
              {{- end }}
            {{- end }}
            {{- if .defaultMode }}
            defaultMode: {{ .defaultMode }}
            {{- end }}
        {{- end }}
        {{- range $configMapMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ .configMapName }}
            {{- if .items }}
            items:
              {{- range .items }}
              - key: {{ .key }}
                path: {{ .path }}
              {{- end }}
            {{- end }}
            {{- if .defaultMode }}
            defaultMode: {{ .defaultMode }}
            {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          tty: true
          args:

            - "start"
            - "--key"
            - "$(LEVOAI_AUTH_KEY)"
            - "--organization"
            - "{{ index $.Values "global" "levoai_config_override" "onprem-api" "org-id" }}"
            {{- if .Values.scheduled }}
            - "--scheduled"
            - "{{ .Values.scheduled }}",
            {{- end }}
            {{- if .Values.group }}
            - "--group"
            - "{{ .Values.group }}"
            {{- end }}
          workingDir: /home/levo/work
          env:
            # Pod facts from the Downward API. The runner self-registers under an
            # auto-generated UUID and reports these as registry metadata + a
            # human-friendly display name (pod_name · cluster · pod_ip). The
            # operator supplies NO runner id.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.cluster }}
            - name: LEVO_RUNNER_CLUSTER
              value: "{{ .Values.cluster }}"
            {{- end }}
            {{- if .Values.runnerLabels }}
            - name: LEVO_RUNNER_LABELS
              value: "{{ .Values.runnerLabels }}"
            {{- end }}
            {{- if .Values.mode }}
            # Runner mode: "onprem" (self-register + per-runner command queue) or
            # "cloud" (no registration; shared cloud command queue). Empty -> the
            # CLI default (onprem). The workspace is resolved automatically from the
            # auth key + org on registration, so no workspace value is needed.
            - name: LEVO_RUNNER_MODE
              value: "{{ .Values.mode }}"
            {{- end }}
            {{- if .Values.workspace }}
            # Optional/advanced: explicit workspace id for on-prem registration.
            # Normally left empty — the runner auto-resolves the org's single
            # workspace from the auth key + org. Set this only to override that
            # (kept for backward compatibility). Ignored in cloud mode.
            - name: LEVOAI_WORKSPACE_ID
              value: "{{ .Values.workspace }}"
            {{- end }}
            {{- if .Values.identity }}
            # Optional Temporal worker-identity prefix (distinct from the registry
            # runner id); the pod name is appended so each replica is distinct.
            - name: LEVO_TESTRUNNER_IDENTITY
              value: "{{ .Values.identity }}-$(POD_NAME)"
            {{- end }}
            - name: LOCAL_USER_ID
              value: "{{ .Values.localUserId }}"
            - name: LOCAL_GROUP_ID
              value: "{{ .Values.localGroupId }}"
            - name: TERM
              value: "xterm-256color"
            - name: LEVO_BASE_URL
              value: "{{ index $.Values "global" "levoai_config_override" "onprem-api" "url" }}"
            - name: LEVOAI_AUTH_KEY
              valueFrom:
                secretKeyRef:
                  name: levoai-satellite
                  key: refresh-token

          {{- $envVars := dict }}
          {{- if hasKey .Values "global" }}
          {{- if hasKey .Values.global "levo" }}
          {{- if hasKey .Values.global.levo "env" }}
          {{- $envVars = merge $envVars .Values.global.levo.env }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- if .Values.extraEnv }}
          {{- $envVars = merge $envVars .Values.extraEnv }}
          {{- end }}
          {{- range $key, $value := $envVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
          {{- if .Values.extraEnvVars }}
          {{- toYaml .Values.extraEnvVars | nindent 2 }}
          {{- end }}
          {{- if or .Values.extraEnvVarsCM .Values.extraEnvVarsSecret }}
          envFrom:
            {{- if .Values.extraEnvVarsCM }}
            - configMapRef:
                name: {{ tpl .Values.extraEnvVarsCM . | quote }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ tpl .Values.extraEnvVarsSecret . | quote }}
            {{- end }}
          {{- end }}
          {{- if or $secretMounts $configMapMounts }}
          volumeMounts:
            {{- range $secretMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              readOnly: true
            {{- end }}
            {{- range $configMapMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}

