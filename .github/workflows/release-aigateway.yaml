name: Release AI Gateway Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: Private Chart Version (e.g. 2.2.0); omit to pull latest
        required: false
        type: string

jobs:
  release:
    uses: ./.github/workflows/release-private-chart.yaml
    with:
      name: aigateway
      version: ${{ inputs.version }}
    secrets: inherit
