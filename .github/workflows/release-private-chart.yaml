name: Release Private Chart to Public Repo

on:
  workflow_dispatch:
    inputs:
      name:
        description: name of the chart (e.g. `levoai-gateway`)
        required: true
        type: string
      version:
        description: version of the chart (e.g. `0.1.0`)
        required: false
        type: string
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      version:
        required: false
        type: string

concurrency: charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.LEVOBOT_TOKEN }}

      - name: Configure Git
        run: |
          gh auth setup-git
          git config user.name "levobot"
          git config user.email "github-bot@levo.ai"
        env:
          GH_TOKEN: ${{ secrets.LEVOBOT_TOKEN }}

      - name: Validate chart name
        env:
          CHART_NAME: ${{ inputs.name }}
        run: |
          if ! echo "$CHART_NAME" | grep -qE '^[a-z0-9][a-z0-9-]*$'; then
            echo "Error: chart name '$CHART_NAME' is invalid. Must match ^[a-z0-9][a-z0-9-]*$"
            exit 1
          fi

      - uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCS_SA_KEY }}

      - uses: 'google-github-actions/setup-gcloud@v1'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.4.0

      - name: Download Private Chart
        env:
          CHART_NAME: ${{ inputs.name }}
          CHART_VERSION: ${{ inputs.version }}
        run: |
          helm plugin install https://github.com/hayorov/helm-gcs.git --version 0.4.1 || echo "Helm plugin already exists."
          helm repo add levoai-private ${{ secrets.HELM_GCS_REPOSITORY }} || echo "Helm repo already exists"
          helm repo update
          mkdir -p .cr-release-packages
          cd .cr-release-packages
          if [ -n "$CHART_VERSION" ]; then
            helm pull "levoai-private/$CHART_NAME" --version "$CHART_VERSION"
          else
            helm pull "levoai-private/$CHART_NAME"
          fi

      - name: Check for existing tags
        run: |
          git fetch --tags
          if git tag --list | grep .; then
            echo "Found tags:"
            git tag --list | tail -n 5
          else
            echo "No tags exist in this repo"
          fi

      - name: Release Chart
        id: release_step
        uses: helm/chart-releaser-action@v1.5.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - name: Check what happened
        run: |
          CHART_FILE=$(ls .cr-release-packages/*.tgz | head -n1)
          TAG="$(basename $CHART_FILE .tgz)"

          if [ "${{ steps.release_step.outcome }}" == "failure" ]; then
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already existed - that is why it failed"
            else
              echo "Release $TAG truly failed to create"
              exit 1
            fi
          else
            echo "Release $TAG was created successfully"
          fi
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Extract Chart to Repo
        env:
          CHART_NAME: ${{ inputs.name }}
        run: |
          rm -rf "levoai/$CHART_NAME"
          tar xzf .cr-release-packages/*.tgz -C levoai/
          git add "levoai/$CHART_NAME"
          git commit -sm "Update $CHART_NAME to latest released version"
          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Sync attempt $attempt of $max_attempts..."
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Successfully pushed on attempt $attempt."
                break
              else
                echo "Push failed on attempt $attempt."
              fi
            else
              echo "Rebase failed on attempt $attempt."
              git rebase --abort || true
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Failed to push after $max_attempts attempts."
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 5
          done
