name: Release AI Firewall Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: Private Chart Version (e.g. 0.1.5); omit to pull latest
        required: false
        type: string

jobs:
  release:
    uses: ./.github/workflows/release-private-chart.yaml
    with:
      name: levoai-firewall
      version: ${{ inputs.version }}
    secrets: inherit
